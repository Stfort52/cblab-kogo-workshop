name: scRNA-seq notebooks

on:
  push:
    branches: ["notebooks"]

jobs:
  test:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      run: docker build -t kogo-scrna-jupyter client

    - name: Run basic analysis notebook
      run: |
        timeout 1200 docker run --rm \
          --memory="8G" \
          --cpus=2.4 \
          -v ${{ github.workspace }}/notebooks:/home/jovyan/notebooks \
          -v $HOST_DATA_DIR:/home/jovyan/data:ro \
          -w /home/jovyan \
          -e OMP_NUM_THREADS=2 \
          -e OPENBLAS_NUM_THREADS=2 \
          -e MKL_NUM_THREADS=2 \
          -e VECLIB_MAXIMUM_THREADS=2 \
          -e NUMEXPR_NUM_THREADS=2 \
          kogo-scrna-jupyter:latest \
          jupyter nbconvert \
            --to notebook \
            --output '{notebook_name}-out.ipynb' \
            --output-dir /home/jovyan/work \
            --execute \
            /home/jovyan/notebooks/basic_pipeline.ipynb


    - name: Run trajectory notebook
      run: |
        timeout 1200 docker run --rm \
          --memory="8G" \
          --cpus=2.4 \
          -v ${{ github.workspace }}/notebooks:/home/jovyan/notebooks \
          -v $HOST_DATA_DIR:/home/jovyan/data:ro \
          -w /home/jovyan \
          -e OMP_NUM_THREADS=2 \
          -e OPENBLAS_NUM_THREADS=2 \
          -e MKL_NUM_THREADS=2 \
          -e VECLIB_MAXIMUM_THREADS=2 \
          -e NUMEXPR_NUM_THREADS=2 \
          kogo-scrna-jupyter:latest \
          jupyter nbconvert \
            --to notebook \
            --output '{notebook_name}-out.ipynb' \
            --output-dir /home/jovyan/work \
            --execute \
            /home/jovyan/notebooks/monocle.ipynb

    - name: Cleanup Image
      if: always()
      run: docker rmi kogo-scrna-jupyter:latest || true

