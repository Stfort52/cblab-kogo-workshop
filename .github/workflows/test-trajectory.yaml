name: scRNA-seq trajectory analysis

on:
  push:
    branches: ["notebooks"]

jobs:
  test:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      run: docker build -t kogo-scrna-jupyter client

    - name: Run notebook
      run: |
        timeout 1800 docker run --rm \
          --memory="8G" \
          --cpus=2.4 \
          -v ${{ github.workspace }}/notebooks/monocle.ipynb:/home/jovyan/monocle.ipynb \
          -v $HOST_DATA_DIR:/home/jovyan/data:ro \
          -w /home/jovyan \
          kogo-scrna-jupyter:latest \
          jupyter nbconvert \
            --to notebook \
            --output monocle-out.ipynb \
            --execute \
            monocle.ipynb
    
    - name: Cleanup Image
      if: always()
      run: docker rmi kogo-scrna-jupyter:latest || true

